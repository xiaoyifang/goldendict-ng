name: Manual Build Action(for testing)
concurrency: 
   group: ${{ github.workflow }}-${{ github.ref }}
   cancel-in-progress: true
on: 
  workflow_dispatch:
    inputs:
      build_macOS:
        description: 'Build macOS'
        type: boolean
        default: false
      build_Windows:
        description: 'Build Windows'
        type: boolean
        default: true

jobs:
  build_macOS:
    if: github.event.inputs.build_macOS == 'true'
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15]
        qt_ver: [ 6.10.3 ]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Install dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: |
          brew install --force --overwrite \
            bzip2 \
            create-dmg \
            hunspell \
            libiconv \
            libogg \
            libvorbis \
            libzim \
            lzip \
            ninja \
            ccache \
            opencc \
            fmt \
            tomlplusplus \
            xapian || true
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-${{ matrix.qt_ver }}
      - name: Cache EB
        id: cache-eb
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/libeb*
            /usr/local/include/eb
            /usr/local/bin/eb*
          key: ${{ runner.os }}-eb-custom
      - name: Install EB
        if: steps.cache-eb.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/xiaoyifang/eb.git
          cd eb && ./configure && make -j 8 && sudo make install && cd ..
      - uses: jurplel/install-qt-action@v4.2.1
        with:
          version: ${{ matrix.qt_ver }}
          arch: clang_64
          modules: qtwebengine qtwebchannel qtpositioning qt5compat qtmultimedia qtimageformats qtspeech      
      - name: Build
        run: |
          mkdir build_dir
          cmake -S . -B build_dir \
            -G Ninja \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DWITH_FFMPEG_PLAYER=OFF \
            -DWITH_TTS=OFF \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="12.0"
          cmake --build build_dir
      - name: Package
        run: |
          cmake --install build_dir/
      - name: Print package content
        run: |
          ls -Rl ./build_dir/redist
      - uses: actions/upload-artifact@v4
        with:
          name: macOS-${{ matrix.os }}-Qt${{ matrix.qt_ver }}
          if-no-files-found: error
          retention-days: 7
          path: '*.dmg'

  build_Windows:
    if: github.event.inputs.build_Windows == 'true'
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2022]
        qt_ver: [ 6.8.3, 6.11.0 ]
        arch: [ win64_msvc2022_64, win64_msvc2022_arm64_cross_compiled ]
        include:
          - arch: win64_msvc2022_64
            vs_arch: amd64
          - arch: win64_msvc2022_arm64_cross_compiled
            vs_arch: arm64
    steps:
      - uses: jurplel/install-qt-action@v4.2.1
        with:
          version: ${{ matrix.qt_ver }}
          arch: ${{ matrix.arch }}
          modules: qtwebengine qtwebchannel qtpositioning qt5compat qtmultimedia qtimageformats qtspeech
          # setup-python: 'false'
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build
        id: build
        run: |
          # Launch-VsDevShell also provides Ninja
          & 'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\Launch-VsDevShell.ps1' `
            -SkipAutomaticLocation -Arch ${{ matrix.vs_arch }} -HostArch amd64
          New-Item -Path './build_dir' -ItemType Directory
          
          # RelWithDebInfo + msvc's = .pdb file beside program file.
          cmake -S . -B "./build_dir" `
            -G Ninja `
            -DCMAKE_C_COMPILER="cl.exe" -DCMAKE_CXX_COMPILER="cl.exe" `
            -DCMAKE_BUILD_TYPE=RelWithDebInfo `
            -DWITH_FFMPEG_PLAYER=OFF `
            -DWITH_VCPKG_BREAKPAD=ON
          cmake --build "./build_dir"
      - name: Package
        run: |
          cd './build_dir'
          cpack --verbose --trace
          cd ..
      - name: Move files
        shell: bash
        run: |
          namePrefix=$(basename "$(ls ./build_dir/*.7z)" .7z)

          # note the name will ensure `installer` ranked higher after sorting
          cd ./build_dir
          mv "${namePrefix}.7z" "${namePrefix}-Windows-installer.7z"
          mv "${namePrefix}.exe" "${namePrefix}-Windows-installer.exe"
          mv ./goldendict/goldendict.exe "./${namePrefix}-Windows-main-exe-file-only.exe" 
          mv ./goldendict/goldendict.pdb "./${namePrefix}-Windows-pdb-debug-file.pdb"
          cd ..
          ls -R
      - uses: actions/upload-artifact@v4
        with:
          name: Windows-${{ matrix.arch }}-Qt${{ matrix.qt_ver }}
          if-no-files-found: error
          retention-days: 7
          path: |
            ./build_dir/*.exe
            ./build_dir/*.7z
            ./build_dir/*.pdb

      - uses: actions/upload-artifact@v4
        with:
          name: Windows-only-exe-${{ matrix.arch }}-Qt${{ matrix.qt_ver }}
          if-no-files-found: error
          retention-days: 7
          path: |
            ./build_dir/*only.exe
         
  
  
